<script>
  const STORAGE_KEY = 'tradeEventsPnL_v1';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoOzSTV7tN6oV73uLhrXb8WJk7PkR4UCIso3poHcBCJZhvjB5B3ztwSqZm2dapQg0D/exec';

  let events = [];
  let editId = null;
  const CATS = ['commute','food','ticket','misc'];

  // --- MULTI ITEM ---
  function addItem(cat, desc='', amt='') {
    const list = document.getElementById(cat + 'List');
    const id = Date.now() + Math.random();
    const row = document.createElement('div');
    row.className = 'item-row';
    row.dataset.id = id;
    row.innerHTML = `
      <input class="item-input" placeholder="Description" value="${escHtml(desc)}" oninput="updateCatTotal('${cat}')" />
      <input class="item-input" type="number" placeholder="₹ Amount" value="${amt}" inputmode="decimal" oninput="updateCatTotal('${cat}')" />
      <button class="btn-remove-item" onclick="removeItem(this,'${cat}')">×</button>
    `;
    list.appendChild(row);
    updateCatTotal(cat);
  }

  function removeItem(btn, cat) {
    btn.closest('.item-row').remove();
    updateCatTotal(cat);
  }

  function updateCatTotal(cat) {
    const list = document.getElementById(cat + 'List');
    const rows = list.querySelectorAll('.item-row');
    let total = 0;
    rows.forEach(r => {
      const amt = parseFloat(r.querySelectorAll('input')[1].value) || 0;
      total += amt;
    });
    document.getElementById(cat + 'Total').textContent = fmt(total);
  }

  function getCatItems(cat) {
    const list = document.getElementById(cat + 'List');
    const rows = list.querySelectorAll('.item-row');
    const items = [];
    rows.forEach(r => {
      const inputs = r.querySelectorAll('input');
      const desc = inputs[0].value.trim();
      const amt = parseFloat(inputs[1].value) || 0;
      if (desc || amt) items.push({ desc, amt });
    });
    return items;
  }

  function getCatTotal(cat) {
    return getCatItems(cat).reduce((s,i) => s + i.amt, 0);
  }

  function clearAllItems() {
    CATS.forEach(cat => {
      document.getElementById(cat + 'List').innerHTML = '';
      document.getElementById(cat + 'Total').textContent = '₹0';
    });
  }

  function populateItems(cat, items) {
    document.getElementById(cat + 'List').innerHTML = '';
    (items||[]).forEach(i => addItem(cat, i.desc, i.amt));
  }

  // --- PROFIT CALC ---
  function calcProfit() {
    const inv = parseFloat(document.getElementById('fInvestment').value) || 0;
    const bal = parseFloat(document.getElementById('fBalance').value) || 0;
    const profit = bal - inv;
    document.getElementById('fProfit').value = profit;
    const preview = document.getElementById('profitPreview');
    const previewVal = document.getElementById('profitPreviewVal');
    if (inv || bal) {
      preview.style.display = 'block';
      previewVal.textContent = fmt(profit);
      previewVal.style.color = profit > 0 ? '#00e5a0' : profit < 0 ? '#ff4f6a' : '#f5c542';
    } else {
      preview.style.display = 'none';
    }
  }

  // --- STORAGE ---
  function loadEvents() {
    try { events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { events = []; }
    render();
  }

  function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  }

  // --- SYNC ---
  function setSyncStatus(status, text) {
    document.getElementById('syncDot').className = 'sync-dot ' + status;
    document.getElementById('syncText').textContent = text;
  }

  async function syncToSheets(eventData, isDelete=false) {
    setSyncStatus('syncing', 'Syncing to Google Sheets...');
    try {
      const payload = isDelete ? { id: eventData.id, _delete: true } : eventData;
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      setSyncStatus('synced', 'Saved to Google Sheets ✓');
      setTimeout(() => setSyncStatus('', 'Ready'), 3000);
    } catch(err) {
      setSyncStatus('error', 'Sync failed — saved locally only');
      setTimeout(() => setSyncStatus('', 'Ready'), 4000);
    }
  }

  // --- FORMAT ---
  function fmt(n) {
    const abs = Math.abs(n);
    return (n < 0 ? '-' : '') + '₹' + abs.toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  function calcNet(ev) {
    const totalExp = CATS.reduce((s,cat) => {
      const items = ev[cat] || [];
      return s + items.reduce((ss,i) => ss + (i.amt||0), 0);
    }, 0);
    return (ev.profit||0) - totalExp;
  }

  function getTotalExp(ev) {
    return CATS.reduce((s,cat) => {
      return s + (ev[cat]||[]).reduce((ss,i) => ss + (i.amt||0), 0);
    }, 0);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- RENDER ---
  function render() {
    const list = document.getElementById('eventsList');
    const totalProfit = events.reduce((s,e) => s + (e.profit||0), 0);
    const totalNet = events.reduce((s,e) => s + calcNet(e), 0);

    document.getElementById('totalEvents').textContent = events.length;
    document.getElementById('totalProfit').textContent = fmt(totalProfit);
    const netEl = document.getElementById('totalNet');
    netEl.textContent = fmt(totalNet);
    netEl.className = 'strip-value ' + (totalNet > 0 ? 'green' : totalNet < 0 ? 'red' : 'yellow');

    if (!events.length) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🎯</span>
          <div class="empty-title">No events yet</div>
          <div class="empty-sub">Tap <strong style="color:#00e5a0">+ New Event</strong> to log<br>your first trading event.</div>
        </div>`;
      return;
    }

    const sorted = [...events].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const catEmojis = { commute:'🚌', food:'🍱', ticket:'🎟️', misc:'📦' };
    const catLabels = { commute:'Commute', food:'Food', ticket:'Event Ticket', misc:'Miscellaneous' };

    list.innerHTML = sorted.map(ev => {
      const net = calcNet(ev);
      const totalExp = getTotalExp(ev);
      const cardClass = net > 0 ? 'profit-card' : net < 0 ? 'loss-card' : 'neutral-card';
      const pnlClass = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
      const badgeText = net > 0 ? 'PROFIT' : net < 0 ? 'LOSS' : 'BREAK EVEN';
      const dateStr = ev.date ? new Date(ev.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

      const catHTML = CATS.map(cat => {
        const items = ev[cat] || [];
        if (!items.length) return '';
        const catTotal = items.reduce((s,i) => s + (i.amt||0), 0);
        const itemRows = items.map(i => `
          <div class="expense-row">
            <span class="expense-label">${escHtml(i.desc||'—')}</span>
            <span class="expense-val expense">- ${fmt(i.amt||0)}</span>
          </div>`).join('');
        return `
          <div class="expense-section">
            <div class="expense-section-title">${catEmojis[cat]} ${catLabels[cat]}</div>
            ${itemRows}
            ${items.length > 1 ? `<div class="expense-section-total"><span>Subtotal</span><span>- ${fmt(catTotal)}</span></div>` : ''}
          </div>`;
      }).join('');

      return `
        <div class="event-card ${cardClass}">
          <div class="card-header" onclick="toggleCard('${ev.id}')">
            <div>
              <div class="card-name">${escHtml(ev.name)}</div>
              <div class="card-date">${dateStr} &nbsp;<span class="net-badge ${pnlClass}">${badgeText}</span></div>
            </div>
            <div style="text-align:right">
              <div class="card-pnl-label">NET P&L</div>
              <div class="card-pnl ${pnlClass}">${fmt(net)}</div>
              <div class="chevron" id="chev-${ev.id}">▼</div>
            </div>
          </div>
          <div class="card-body" id="body-${ev.id}">
            <div class="expense-section">
              <div class="expense-section-title">💵 Investment</div>
              <div class="expense-row">
                <span class="expense-label">Invested</span>
                <span class="expense-val">${fmt(ev.investment||0)}</span>
              </div>
              <div class="expense-row">
                <span class="expense-label">Balance</span>
                <span class="expense-val">${fmt(ev.balance||0)}</span>
              </div>
              <div class="expense-row">
                <span class="expense-label">Trading P&L</span>
                <span class="expense-val ${ev.profit>=0?'income':'expense'}">${fmt(ev.profit||0)}</span>
              </div>
            </div>
            ${catHTML}
            ${ev.notes ? `<div class="expense-row" style="margin-top:6px"><span class="expense-label">📝 Notes</span><span class="expense-val" style="text-align:right;max-width:60%;word-break:break-word">${escHtml(ev.notes)}</span></div>` : ''}
            <div class="divider-row">
              <span>Total Expenses</span>
              <span style="color:#ff4f6a">- ${fmt(totalExp)}</span>
            </div>
            <div class="divider-row" style="font-size:1rem;margin-top:4px">
              <span>Net P&L</span>
              <span class="card-pnl ${pnlClass}" style="font-size:1rem">${fmt(net)}</span>
            </div>
            <div class="card-actions">
              <button class="btn-edit" onclick="editEvent('${ev.id}')">✏️ Edit</button>
              <button class="btn-delete" onclick="deleteEvent('${ev.id}')">🗑️ Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleCard(id) {
    document.getElementById('body-'+id).classList.toggle('open');
    document.getElementById('chev-'+id).classList.toggle('open');
  }

  // --- MODAL ---
  function openModal(ev=null) {
    editId = ev ? ev.id : null;
    document.getElementById('modalTitle').textContent = ev ? 'Edit Event' : 'New Event';
    document.getElementById('fName').value = ev ? ev.name : '';
    document.getElementById('fDate').value = ev ? ev.date : new Date().toISOString().split('T')[0];
    document.getElementById('fInvestment').value = ev ? (ev.investment||'') : '';
    document.getElementById('fBalance').value = ev ? (ev.balance||'') : '';
    document.getElementById('fProfit').value = ev ? (ev.profit||0) : 0;
    document.getElementById('fNotes').value = ev ? (ev.notes||'') : '';
    document.getElementById('profitPreview').style.display = ev && ev.profit ? 'block' : 'none';
    if (ev && ev.profit) {
      document.getElementById('profitPreviewVal').textContent = fmt(ev.profit);
      document.getElementById('profitPreviewVal').style.color = ev.profit >= 0 ? '#00e5a0' : '#ff4f6a';
    }
    clearAllItems();
    if (ev) {
      CATS.forEach(cat => populateItems(cat, ev[cat]||[]));
    }
    document.getElementById('modalOverlay').classList.add('open');
    document.querySelector('.modal').scrollTop = 0;
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null;
  }

  async function saveEvent() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { alert('Please enter an event name.'); return; }

    const catData = {};
    CATS.forEach(cat => { catData[cat] = getCatItems(cat); });

    const data = {
      id: editId || Date.now().toString(),
      name,
      date: document.getElementById('fDate').value,
      investment: parseFloat(document.getElementById('fInvestment').value) || 0,
      balance: parseFloat(document.getElementById('fBalance').value) || 0,
      profit: parseFloat(document.getElementById('fProfit').value) || 0,
      ...catData,
      notes: document.getElementById('fNotes').value.trim(),
    };

    if (editId) {
      events = events.map(e => e.id === editId ? data : e);
    } else {
      events.push(data);
    }

    saveToStorage();
    closeModal();
    render();
    showToast('Event saved! Syncing...');
    await syncToSheets(data);
  }

  function editEvent(id) {
    const ev = events.find(e => e.id === id);
    if (ev) openModal(ev);
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    const ev = events.find(e => e.id === id);
    events = events.filter(e => e.id !== id);
    saveToStorage();
    render();
    showToast('Event deleted');
    if (ev) await syncToSheets(ev, true);
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadEvents();
</script>

</body>
</html>
