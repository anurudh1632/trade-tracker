<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trade Event P&L</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222d;
    --border: #2a2f3d;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --red: #ff4f6a;
    --red-dim: rgba(255,79,106,0.12);
    --yellow: #f5c542;
    --text: #e8eaf0;
    --muted: #6b7280;
    --card-radius: 16px;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
padding-bottom: 32px;
}

header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 20px 20px 16px;
position: sticky;
top: 0;
z-index: 100;
}

.header-top {
display: flex;
justify-content: space-between;
align-items: center;
}

.app-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 1.3rem;
letter-spacing: -0.5px;
color: var(–accent);
}

.app-subtitle {
font-size: 0.65rem;
color: var(–muted);
margin-top: 2px;
letter-spacing: 0.05em;
text-transform: uppercase;
}

.btn-new {
background: var(–accent);
color: #000;
border: none;
border-radius: 10px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.8rem;
padding: 9px 16px;
cursor: pointer;
letter-spacing: 0.02em;
transition: opacity 0.15s;
}
.btn-new:active { opacity: 0.75; }

/* SUMMARY STRIP */
.summary-strip {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 0;
background: var(–surface2);
border-bottom: 1px solid var(–border);
padding: 14px 20px;
}

.strip-item {
text-align: center;
}

.strip-item:not(:last-child) {
border-right: 1px solid var(–border);
}

.strip-label {
font-size: 0.58rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.08em;
}

.strip-value {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 1rem;
margin-top: 2px;
}

.strip-value.green { color: var(–accent); }
.strip-value.red { color: var(–red); }
.strip-value.yellow { color: var(–yellow); }

/* EVENTS LIST */
.events-container {
padding: 16px;
display: flex;
flex-direction: column;
gap: 12px;
}

.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–muted);
}

.empty-icon {
font-size: 2.5rem;
margin-bottom: 12px;
display: block;
}

.empty-title {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 1rem;
color: var(–text);
margin-bottom: 6px;
}

.empty-sub {
font-size: 0.75rem;
line-height: 1.6;
}

/* EVENT CARD */
.event-card {
background: var(–surface);
border-radius: var(–card-radius);
border: 1px solid var(–border);
overflow: hidden;
transition: border-color 0.2s;
}

.event-card.profit-card { border-left: 3px solid var(–accent); }
.event-card.loss-card { border-left: 3px solid var(–red); }
.event-card.neutral-card { border-left: 3px solid var(–yellow); }

.card-header {
padding: 14px 16px 10px;
display: flex;
justify-content: space-between;
align-items: flex-start;
cursor: pointer;
}

.card-name {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
color: var(–text);
line-height: 1.3;
flex: 1;
margin-right: 10px;
}

.card-date {
font-size: 0.65rem;
color: var(–muted);
margin-top: 3px;
letter-spacing: 0.04em;
}

.card-pnl {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 1.05rem;
white-space: nowrap;
text-align: right;
}

.card-pnl.pos { color: var(–accent); }
.card-pnl.neg { color: var(–red); }
.card-pnl.zero { color: var(–yellow); }

.card-pnl-label {
font-size: 0.58rem;
color: var(–muted);
text-align: right;
letter-spacing: 0.06em;
text-transform: uppercase;
}

.card-body {
display: none;
border-top: 1px solid var(–border);
padding: 14px 16px;
}

.card-body.open { display: block; }

.expense-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 5px 0;
font-size: 0.8rem;
}

.expense-row:not(:last-child) {
border-bottom: 1px dashed var(–border);
}

.expense-label {
color: var(–muted);
display: flex;
align-items: center;
gap: 6px;
}

.expense-val { color: var(–text); font-weight: 500; }
.expense-val.income { color: var(–accent); }
.expense-val.expense { color: var(–red); }

.divider-row {
border-top: 1px solid var(–border);
margin: 8px 0 4px;
padding-top: 8px;
display: flex;
justify-content: space-between;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.85rem;
}

.card-actions {
display: flex;
gap: 8px;
margin-top: 14px;
padding-top: 12px;
border-top: 1px solid var(–border);
}

.btn-edit, .btn-delete {
flex: 1;
border: none;
border-radius: 8px;
padding: 9px;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 0.78rem;
cursor: pointer;
transition: opacity 0.15s;
}

.btn-edit { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.btn-delete { background: var(–red-dim); color: var(–red); border: 1px solid rgba(255,79,106,0.3); }
.btn-edit:active, .btn-delete:active { opacity: 0.65; }

/* MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
z-index: 200;
align-items: flex-end;
justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border-radius: 20px 20px 0 0;
border-top: 1px solid var(–border);
width: 100%;
max-height: 92vh;
overflow-y: auto;
padding: 24px 20px 40px;
animation: slideUp 0.25s ease;
}

@keyframes slideUp {
from { transform: translateY(40px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.modal-title {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 1.15rem;
margin-bottom: 20px;
color: var(–accent);
}

.form-group {
margin-bottom: 16px;
}

.form-label {
display: block;
font-size: 0.68rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 6px;
}

.form-input {
width: 100%;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 0.9rem;
padding: 12px 14px;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}

.form-input:focus { border-color: var(–accent); }
.form-input::placeholder { color: var(–muted); }

.form-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
}

.section-heading {
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(–accent);
font-weight: 600;
margin: 20px 0 12px;
padding-bottom: 6px;
border-bottom: 1px solid var(–accent-dim);
}

.btn-save {
width: 100%;
background: var(–accent);
color: #000;
border: none;
border-radius: 12px;
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 1rem;
padding: 15px;
cursor: pointer;
margin-top: 24px;
letter-spacing: 0.02em;
transition: opacity 0.15s;
}

.btn-save:active { opacity: 0.75; }

.btn-cancel {
width: 100%;
background: transparent;
color: var(–muted);
border: 1px solid var(–border);
border-radius: 12px;
font-family: ‘Syne’, sans-serif;
font-weight: 600;
font-size: 0.9rem;
padding: 13px;
cursor: pointer;
margin-top: 10px;
}

.chevron {
display: inline-block;
transition: transform 0.2s;
color: var(–muted);
font-size: 0.75rem;
}
.chevron.open { transform: rotate(180deg); }

.net-badge {
display: inline-block;
padding: 2px 8px;
border-radius: 20px;
font-size: 0.65rem;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
letter-spacing: 0.04em;
}

.net-badge.pos { background: var(–accent-dim); color: var(–accent); }
.net-badge.neg { background: var(–red-dim); color: var(–red); }
.net-badge.zero { background: rgba(245,197,66,0.12); color: var(–yellow); }
</style>

</head>

<script>
  const STORAGE_KEY = 'tradeEventsPnL_v1';
  let events = [];
  let editId = null;

  // --- LOAD ---
  function loadEvents() {
    try {
      events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch(e) { events = []; }
    render();
  }

  // --- SAVE TO STORAGE ---
  function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  }

  // --- CURRENCY FORMAT ---
  function fmt(n) {
    const abs = Math.abs(n);
    return (n < 0 ? '-' : '') + '₹' + abs.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  }

  // --- CALC NET ---
  function calcNet(ev) {
    const totalExp = (ev.commute||0) + (ev.food||0) + (ev.ticket||0) + (ev.misc||0);
    return (ev.profit||0) - totalExp;
  }

  // --- RENDER ---
  function render() {
    const list = document.getElementById('eventsList');

    // summary
    const totalEvents = events.length;
    const totalProfit = events.reduce((s,e) => s + (e.profit||0), 0);
    const totalNet = events.reduce((s,e) => s + calcNet(e), 0);

    document.getElementById('totalEvents').textContent = totalEvents;
    document.getElementById('totalProfit').textContent = fmt(totalProfit);
    const netEl = document.getElementById('totalNet');
    netEl.textContent = fmt(totalNet);
    netEl.className = 'strip-value ' + (totalNet > 0 ? 'green' : totalNet < 0 ? 'red' : 'yellow');

    if (!events.length) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🎯</span>
          <div class="empty-title">No events yet</div>
          <div class="empty-sub">Tap <strong style="color:var(--accent)">+ New Event</strong> to log<br>your first trading event.</div>
        </div>`;
      return;
    }

    // sort by date desc
    const sorted = [...events].sort((a,b) => (b.date||'').localeCompare(a.date||''));

    list.innerHTML = sorted.map(ev => {
      const net = calcNet(ev);
      const totalExp = (ev.commute||0) + (ev.food||0) + (ev.ticket||0) + (ev.misc||0);
      const cardClass = net > 0 ? 'profit-card' : net < 0 ? 'loss-card' : 'neutral-card';
      const pnlClass = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
      const badgeClass = pnlClass;
      const badgeText = net > 0 ? 'PROFIT' : net < 0 ? 'LOSS' : 'BREAK EVEN';
      const dateStr = ev.date ? new Date(ev.date + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : '—';

      return `
        <div class="event-card ${cardClass}" id="card-${ev.id}">
          <div class="card-header" onclick="toggleCard('${ev.id}')">
            <div>
              <div class="card-name">${escHtml(ev.name)}</div>
              <div class="card-date">${dateStr} &nbsp;<span class="net-badge ${badgeClass}">${badgeText}</span></div>
            </div>
            <div style="text-align:right">
              <div class="card-pnl-label">NET P&L</div>
              <div class="card-pnl ${pnlClass}">${fmt(net)}</div>
              <div class="chevron" id="chev-${ev.id}">▼</div>
            </div>
          </div>
          <div class="card-body" id="body-${ev.id}">
            <div class="expense-row">
              <span class="expense-label">🟢 Trading Profit</span>
              <span class="expense-val income">${fmt(ev.profit||0)}</span>
            </div>
            <div class="expense-row">
              <span class="expense-label">🚌 Commute</span>
              <span class="expense-val expense">${ev.commute ? '- ' + fmt(ev.commute) : '—'}</span>
            </div>
            <div class="expense-row">
              <span class="expense-label">🍱 Food</span>
              <span class="expense-val expense">${ev.food ? '- ' + fmt(ev.food) : '—'}</span>
            </div>
            <div class="expense-row">
              <span class="expense-label">🎟️ Event Ticket</span>
              <span class="expense-val expense">${ev.ticket ? '- ' + fmt(ev.ticket) : '—'}</span>
            </div>
            <div class="expense-row">
              <span class="expense-label">📦 Miscellaneous</span>
              <span class="expense-val expense">${ev.misc ? '- ' + fmt(ev.misc) : '—'}</span>
            </div>
            ${ev.notes ? `<div class="expense-row"><span class="expense-label">📝 Notes</span><span class="expense-val" style="text-align:right;max-width:60%;word-break:break-word">${escHtml(ev.notes)}</span></div>` : ''}
            <div class="divider-row">
              <span>Total Expenses</span>
              <span style="color:var(--red)">- ${fmt(totalExp)}</span>
            </div>
            <div class="divider-row" style="font-size:1rem;margin-top:4px">
              <span>Net P&L</span>
              <span class="${pnlClass}">${fmt(net)}</span>
            </div>
            <div class="card-actions">
              <button class="btn-edit" onclick="editEvent('${ev.id}')">✏️ Edit</button>
              <button class="btn-delete" onclick="deleteEvent('${ev.id}')">🗑️ Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleCard(id) {
    const body = document.getElementById('body-' + id);
    const chev = document.getElementById('chev-' + id);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  }

  // --- MODAL ---
  function openModal(ev = null) {
    editId = ev ? ev.id : null;
    document.getElementById('modalTitle').textContent = ev ? 'Edit Event' : 'New Event';
    document.getElementById('fName').value = ev ? ev.name : '';
    document.getElementById('fDate').value = ev ? ev.date : new Date().toISOString().split('T')[0];
    document.getElementById('fProfit').value = ev ? (ev.profit || '') : '';
    document.getElementById('fCommute').value = ev ? (ev.commute || '') : '';
    document.getElementById('fFood').value = ev ? (ev.food || '') : '';
    document.getElementById('fTicket').value = ev ? (ev.ticket || '') : '';
    document.getElementById('fMisc').value = ev ? (ev.misc || '') : '';
    document.getElementById('fNotes').value = ev ? (ev.notes || '') : '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null;
  }

  function saveEvent() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { alert('Please enter an event name.'); return; }

    const data = {
      id: editId || Date.now().toString(),
      name,
      date: document.getElementById('fDate').value,
      profit: parseFloat(document.getElementById('fProfit').value) || 0,
      commute: parseFloat(document.getElementById('fCommute').value) || 0,
      food: parseFloat(document.getElementById('fFood').value) || 0,
      ticket: parseFloat(document.getElementById('fTicket').value) || 0,
      misc: parseFloat(document.getElementById('fMisc').value) || 0,
      notes: document.getElementById('fNotes').value.trim(),
    };

    if (editId) {
      events = events.map(e => e.id === editId ? data : e);
    } else {
      events.push(data);
    }

    saveToStorage();
    closeModal();
    render();
  }

  function editEvent(id) {
    const ev = events.find(e => e.id === id);
    if (ev) openModal(ev);
  }

  function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    events = events.filter(e => e.id !== id);
    saveToStorage();
    render();
  }

  // close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // --- INIT ---
  loadEvents();
</script>

</body>
